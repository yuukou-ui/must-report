<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9138"/><stop offset="1" stop-color="#e85d00"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c3d72"/><stop offset="1" stop-color="#0f2545"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- 重なった書類（束）：後ろ2枚＋前面1枚 -->
  <rect x="96"  y="92"  width="200" height="250" rx="20" fill="#ffffff" opacity="0.45"/>
  <rect x="126" y="122" width="200" height="250" rx="20" fill="#ffffff" opacity="0.72"/>
  <rect x="156" y="152" width="200" height="250" rx="20" fill="#ffffff"/>
  <!-- 前面の書類の文字行（紺＝ブランドと連動） -->
  <g fill="#14315e">
    <rect x="182" y="198" width="148" height="14" rx="7"/>
    <rect x="182" y="238" width="148" height="14" rx="7"/>
    <rect x="182" y="278" width="148" height="14" rx="7"/>
    <rect x="182" y="318" width="92"  height="14" rx="7"/>
  </g>
  <!-- 白いスパークル（報告書アイコンと対の装飾） -->
  <path d="M400 150 l8 22 l22 8 l-22 8 l-8 22 l-8 -22 l-22 -8 l22 -8 z" fill="#ffffff" opacity="0.92"/>
  <!-- Mバッジ（右斜め下に重ねる） -->
  <g>
    <rect x="300" y="312" width="130" height="126" rx="32" fill="#ffffff"/>
    <rect x="305" y="317" width="120" height="116" rx="27" fill="url(#navy)"/>
    <g transform="translate(320,335) scale(0.90,0.80)">
      <path d="M0,100 L0,0 L25,0 L50,40 L75,0 L100,0 L100,100 L78,100 L78,38 L57,72 L43,72 L22,38 L22,100 Z" fill="#f26a21"/>
    </g>
    <path d="M405 336 l4 11 l11 4 l-11 4 l-4 11 l-4 -11 l-11 -4 l11 -4 z" fill="#fff4e6" opacity="0.95"/>
  </g>
</svg>
